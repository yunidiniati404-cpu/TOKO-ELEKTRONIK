<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="#0F1419" stroke="#00D4FF" stroke-width="3"/>
  
  <!-- Circuit board pattern -->
  <rect x="50" y="60" width="100" height="80" fill="none" stroke="#00D4FF" stroke-width="2" rx="8"/>
  
  <!-- Monitor/Device -->
  <g>
    <!-- Screen -->
    <rect x="60" y="65" width="80" height="60" fill="#1A2332" stroke="#00D4FF" stroke-width="2" rx="4"/>
    <!-- Screen glow -->
    <rect x="62" y="67" width="76" height="56" fill="#00D4FF" opacity="0.15" rx="2"/>
    <!-- Scan lines effect -->
    <line x1="62" y1="75" x2="138" y2="75" stroke="#00D4FF" stroke-width="1" opacity="0.5"/>
    <line x1="62" y1="85" x2="138" y2="85" stroke="#00D4FF" stroke-width="1" opacity="0.5"/>
    <line x1="62" y1="95" x2="138" y2="95" stroke="#00D4FF" stroke-width="1" opacity="0.5"/>
    <line x1="62" y1="105" x2="138" y2="105" stroke="#00D4FF" stroke-width="1" opacity="0.5"/>
    <line x1="62" y1="115" x2="138" y2="115" stroke="#00D4FF" stroke-width="1" opacity="0.5"/>
  </g>
  
  <!-- Device stand -->
  <rect x="85" y="125" width="30" height="8" fill="#00D4FF" stroke="#00D4FF" stroke-width="1" rx="2"/>
  <rect x="90" y="133" width="20" height="12" fill="#0F1419" stroke="#00D4FF" stroke-width="1" rx="2"/>
  
  <!-- Power indicator -->
  <circle cx="145" cy="95" r="4" fill="#00FF88"/>
  <circle cx="145" cy="95" r="6" fill="none" stroke="#00FF88" stroke-width="1" opacity="0.5"/>
  
  <!-- Spark dots for tech vibe -->
  <circle cx="130" cy="50" r="2" fill="#00D4FF"/>
  <circle cx="70" cy="155" r="2" fill="#00D4FF"/>
  <circle cx="155" cy="130" r="2" fill="#00FF88"/>
</svg>